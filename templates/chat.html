<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/static/icons/magni-micro.svg">
  <link rel="manifest" href="/static/manifest.json">
  <meta name="theme-color" content="#08081a">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Magni — Customer Support</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* ── Magni Brand Colors ── */
      --magni-midnight: #08081a;
      --magni-deep-sky: #1a1a3a;
      --magni-gold: #fbdc64;
      --magni-amber: #9e7e1e;
      --text-main: #f3f4f6;
      --text-muted: #9ca3af;
      --glass-bg: rgba(26, 26, 58, 0.45);
      --glass-border: rgba(251, 220, 100, 0.15);
      --glass-focus: rgba(251, 220, 100, 0.3);
    }

    body {
      background-color: var(--magni-midnight);
      color: var(--text-main);
      font-family: 'DM Sans', sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.25rem 2rem;
      background: rgba(8, 8, 26, 0.8);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--glass-border);
      z-index: 10;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .brand-logo {
      width: 32px;
      height: 32px;
    }

    .brand-title {
      font-family: 'Fraunces', serif;
      font-weight: 600;
      font-size: 1.5rem;
      letter-spacing: -0.02em;
      color: var(--text-main);
    }

    .brand-tag {
      font-size: 0.75rem;
      font-family: 'DM Mono', monospace;
      color: var(--magni-gold);
      border: 1px solid rgba(251, 220, 100, 0.3);
      padding: 0.15rem 0.5rem;
      border-radius: 9999px;
      text-transform: uppercase;
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      max-width: 900px;
      width: 100%;
      margin: 0 auto;
      padding: 1.5rem 1.5rem 0 1.5rem;
      overflow: hidden;
    }

    #chat-container {
      flex: 1;
      overflow-y: auto;
      padding-right: 0.5rem;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    /* Custom Scrollbar */
    #chat-container::-webkit-scrollbar { width: 6px; }
    #chat-container::-webkit-scrollbar-track { background: transparent; }
    #chat-container::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 9999px; }
    #chat-container::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

    .message {
      max-width: 80%;
      display: flex;
      flex-direction: column;
      animation: fadeIn 0.3s ease-out forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.user {
      align-self: flex-end;
    }

    .message.magni {
      align-self: flex-start;
    }

    .message-bubble {
      padding: 0.95rem 1.25rem;
      border-radius: 1.25rem;
      line-height: 1.5;
      font-size: 0.95rem;
    }

    .message.user .message-bubble {
      background: var(--magni-deep-sky);
      border: 1px solid var(--glass-border);
      border-bottom-right-radius: 0.25rem;
      color: var(--text-main);
    }

    .message.magni .message-bubble {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-bottom-left-radius: 0.25rem;
      color: #e5e7eb;
    }

    /* Markdown styling inside bubbles */
    .message-bubble p { margin-bottom: 0.75rem; }
    .message-bubble p:last-child { margin-bottom: 0; }
    .message-bubble code { font-family: 'DM Mono', monospace; background: rgba(0,0,0,0.3); padding: 0.15rem 0.3rem; border-radius: 4px; font-size: 0.85rem; color: var(--magni-gold); }
    .message-bubble pre { background: rgba(0,0,0,0.4); padding: 0.75rem; border-radius: 8px; overflow-x: auto; margin: 0.75rem 0; border: 1px solid rgba(255,255,255,0.05); }
    .message-bubble pre code { background: transparent; padding: 0; color: inherit; }
    .message-bubble ul, .message-bubble ol { margin-left: 1.25rem; margin-bottom: 0.75rem; }

    .message-time {
      font-size: 0.7rem;
      color: var(--text-muted);
      margin-top: 0.35rem;
      font-family: 'DM Mono', monospace;
    }

    .message.user .message-time { align-self: flex-end; }
    .message.magni .message-time { align-self: flex-start; }

    /* Typing Indicator */
    .typing-indicator {
      display: flex;
      gap: 4px;
      padding: 6px 0;
      align-items: center;
    }
    .typing-indicator span {
      width: 6px;
      height: 6px;
      background-color: var(--text-muted);
      border-radius: 50%;
      animation: bounce 1.4s infinite ease-in-out both;
    }
    .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
    .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0); }
      40% { transform: scale(1.0); }
    }

    /* Resolution Context Bar */
    .resolution-bar {
      display: none;
      align-items: center;
      gap: 1rem;
      padding: 0.75rem 1.25rem;
      background: rgba(26, 26, 58, 0.8);
      border: 1px solid var(--glass-border);
      border-radius: 0.75rem;
      margin-top: 0.5rem;
      animation: fadeIn 0.3s ease-out;
      width: fit-content;
    }
    .resolution-bar.visible { display: flex; }
    .resolution-text { font-size: 0.85rem; color: var(--text-muted); }
    .resolution-btn {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.15);
      color: var(--text-main);
      padding: 0.25rem 0.75rem;
      border-radius: 6px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .resolution-btn:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.3); }
    .resolution-btn.yes:hover { border-color: #38a169; color: #48bb78; }
    .resolution-btn.no:hover { border-color: #e53e3e; color: #f56565; }

    /* Input Footer Workspace */
    .footer-area {
      padding: 1.5rem 0;
      background: linear-gradient(to top, var(--magni-midnight) 80%, transparent);
    }

    .input-wrapper {
      position: relative;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 1.25rem;
      padding: 0.5rem 0.75rem;
      display: flex;
      align-items: flex-end;
      gap: 0.5rem;
      transition: border-color 0.25s ease, box-shadow 0.25s ease;
    }

    .input-wrapper:focus-within {
      border-color: var(--glass-focus);
      box-shadow: 0 0 0 3px rgba(251, 220, 100, 0.08);
    }

    textarea {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text-main);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      padding: 0.5rem;
      resize: none;
      max-height: 160px;
      height: 38px;
      line-height: 1.4;
    }

    textarea::placeholder { color: var(--text-muted); }

    .send-button {
      background: var(--magni-gold);
      border: none;
      outline: none;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform 0.2s, background-color 0.2s;
      flex-shrink: 0;
      margin-bottom: 2px;
    }

    .send-button:hover { transform: scale(1.04); background-color: #ebd15b; }
    .send-button:active { transform: scale(0.96); }
    .send-button svg { width: 16px; height: 16px; fill: var(--magni-midnight); margin-left: 1px; }

    /* Modal / Feedback Layout */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(4, 4, 14, 0.8);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s ease;
      z-index: 100;
    }
    .modal-overlay.active { opacity: 1; pointer-events: auto; }
    .modal-card {
      background: #11112a;
      border: 1px solid var(--glass-border);
      padding: 2rem;
      border-radius: 1.25rem;
      max-width: 420px;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
      transform: scale(0.95);
      transition: transform 0.3s ease;
    }
    .modal-overlay.active .modal-card { transform: scale(1); }
    .modal-title { font-family: 'Fraunces', serif; font-size: 1.35rem; color: var(--text-main); }
    .stars-row { display: flex; gap: 0.5rem; justify-content: center; margin: 0.5rem 0; }
    .star { font-size: 1.75rem; color: #2d2d50; cursor: pointer; transition: color 0.15s; }
    .star.active, .star:hover { color: var(--magni-gold); }
    .feedback-textarea {
      background: rgba(0,0,0,0.25);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      padding: 0.75rem;
      color: var(--text-main);
      font-size: 0.9rem;
      height: 80px;
    }
    .feedback-submit {
      background: var(--magni-gold);
      color: var(--magni-midnight);
      border: none; padding: 0.65rem;
      border-radius: 8px; font-weight: 500;
      cursor: pointer; transition: opacity 0.2s;
    }
    .feedback-submit:hover { opacity: 0.9; }
    .modal-close {
      text-align: center; font-size: 0.8rem; color: var(--text-muted); cursor: pointer;
    }
  </style>
</head>
<body>

  <header>
    <div class="brand">
      <div class="brand-logo" id="logo-target"></div>
      <h1 class="brand-title">Magni</h1>
      <span class="brand-tag">Support Engine</span>
    </div>
  </header>

  <main>
    <div id="chat-container">
      <!-- Default Greeting Bubble -->
      <div class="message magni">
        <div class="message-bubble">
          <p>Hello! I am <strong>Magni</strong>, an AI customer operations assistant built to automate knowledge distribution and handle platform inquiries. How can I help you explore today?</p>
        </div>
        <div class="message-time">System Active</div>
      </div>
    </div>

    <!-- Context / Resolution Feedback Trigger Row -->
    <div class="resolution-bar" id="resolutionBar">
      <span class="resolution-text">Did this answer your question?</span>
      <button class="resolution-btn yes" onclick="submitResolution(true)">Yes</button>
      <button class="resolution-btn no" onclick="submitResolution(false)">No</button>
    </div>

    <div class="footer-area">
      <div class="input-wrapper">
        <textarea 
          id="messageInput" 
          placeholder="Type a message..." 
          oninput="autoResize(this)" 
          onkeydown="handleKeyDown(event)"
        ></textarea>
        <button class="send-button" onclick="sendMessage()" aria-label="Send Message">
          <svg viewBox="0 0 24 24">
            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
          </svg>
        </button>
      </div>
    </div>
  </main>

  <!-- Feedback Modal Framework Overlay -->
  <div class="modal-overlay" id="feedbackModal">
    <div class="modal-card">
      <h3 class="modal-title">Rate your session</h3>
      <div class="stars-row">
        <span class="star" data-rating="1">★</span>
        <span class="star" data-rating="2">★</span>
        <span class="star" data-rating="3">★</span>
        <span class="star" data-rating="4">★</span>
        <span class="star" data-rating="5">★</span>
      </div>
      <textarea class="feedback-textarea" id="feedbackComment" placeholder="Any additional notes on how Magni performed? (Optional)"></textarea>
      <button class="feedback-submit" onclick="submitFeedbackForm()">Submit Evaluation</button>
      <span class="modal-close" onclick="closeFeedback()">Skip and close</span>
    </div>
  </div>

  <script>
    // Textarea auto-sizing implementation
    function autoResize(element) {
      element.style.height = 'auto';
      element.style.height = (element.scrollHeight) + 'px';
    }

    // Capture Enter triggers safely without Shift+Enter conflict
    function handleKeyDown(event) {
      if (event.key === 'Enter' && !event.shiftKey) {
        event.preventDefault(); 
        sendMessage();
      }
    }

    function magniSVG() {
      return `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#fff4b8"/>
            <stop offset="60%" stop-color="#fbdc64"/>
            <stop offset="100%" stop-color="#b89314"/>
          </linearGradient>
        </defs>
        <circle cx="50" cy="50" r="46" fill="none" stroke="url(#goldGrad)" stroke-width="2.5" opacity="0.4"/>
        <path d="M32,28 L50,15 L68,28 L68,72 L50,85 L32,72 Z" fill="none" stroke="url(#goldGrad)" stroke-width="4" stroke-linejoin="round"/>
        <path d="M50,15 L50,85" stroke="url(#goldGrad)" stroke-width="1.5" stroke-dasharray="4,4" opacity="0.6"/>
        <polygon points="50,32 60,52 38,44" fill="url(#goldGrad)" opacity="0.9"/>
        <polygon points="50,68 40,48 62,56" fill="url(#goldGrad)" opacity="0.9"/>
      </svg>`;
    }

    document.getElementById('logo-target').innerHTML = magniSVG();

    // Track active persistent session tokens safely via client generation
    const sessionId = "{{ session.get('session_id', '') }}";

    function formatTime() {
      const now = new Date();
      return now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
    }

    // Simplified markdown inline compiler helper
    function compileMarkdown(text) {
      let html = text
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");

      // Code blocks
      html = html.replace(/```([\s\S]+?)
```/g, '<pre><code>$1</code></pre>');
      // Inline code
      html = html.replace(/`([^`]+?)`/g, '<code>$1</code>');
      // Boldings
      html = html.replace(/\*\*([\s\S]+?)\*\*/g, '<strong>$1</strong>');
      // Lists matching lines
      let lines = html.split('\n');
      let inList = false;
      for(let i=0; i<lines.length; i++){
        if (lines[i].trim().startsWith('- ')) {
          lines[i] = (inList ? '' : '<ul style="margin-left:1.25rem; margin-bottom:0.75rem;">') + `<li>${lines[i].trim().substring(2)}</li>`;
          inList = true;
        } else {
          if (inList) {
            lines[i-1] += '</ul>';
            inList = false;
          }
        }
      }
      if(inList) lines[lines.length-1] += '</ul>';
      
      return lines.join('\n').replace(/\n/g, '<br>');
    }

    function addMessage(text, sender) {
      const container = document.getElementById('chat-container');
      const msgDiv = document.createElement('div');
      msgDiv.classList.add('message', sender);

      const bubble = document.createElement('div');
      bubble.classList.add('message-bubble');
      bubble.innerHTML = sender === 'magni' ? compileMarkdown(text) : text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/\n/g, '<br>');

      const timeDiv = document.createElement('div');
      timeDiv.classList.add('message-time');
      timeDiv.textContent = formatTime();

      msgDiv.appendChild(bubble);
      msgDiv.appendChild(timeDiv);
      container.appendChild(msgDiv);

      container.scrollTop = container.scrollHeight;
      return msgDiv;
    }

    function showTypingIndicator() {
      const container = document.getElementById('chat-container');
      const indDiv = document.createElement('div');
      indDiv.classList.add('message', 'magni', 'indicator-wrapper');
      indDiv.id = 'typingIndicator';

      const bubble = document.createElement('div');
      bubble.classList.add('message-bubble');
      bubble.innerHTML = `<div class="typing-indicator"><span></span><span></span><span></span></div>`;
      
      indDiv.appendChild(bubble);
      container.appendChild(indDiv);
      container.scrollTop = container.scrollHeight;
    }

    function removeTypingIndicator() {
      const el = document.getElementById('typingIndicator');
      if (el) el.remove();
    }

    async function sendMessage() {
      const input = document.getElementById('messageInput');
      const msg = input.value.trim();
      if (!msg) return;

      // Add to display viewport local loop
      addMessage(msg, 'user');
      input.value = '';
      input.style.height = '38px'; // Reset sizing baseline

      showTypingIndicator();

      try {
        const response = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: msg, session_id: sessionId })
        });

        removeTypingIndicator();

        if (!response.ok) {
          addMessage("I experienced an unexpected connection issue processing that. Please try once more.", 'magni');
          return;
        }

        const data = await response.get_json ? await response.get_json() : await response.json();
        addMessage(data.response, 'magni');

        // Prime feedback row loop shortly after completion
        setTimeout(showResolutionBar, 2000);

      } catch (err) {
        removeTypingIndicator();
        addMessage("Network timeout or gateway error encountered. Confirm infrastructure status.", 'magni');
      }
    }

    let selectedRating = 0;

    function showFeedback() {
      document.getElementById('feedbackModal').classList.add('active');
    }

    function closeFeedback() {
      document.getElementById('feedbackModal').classList.remove('active');
    }

    async function submitFeedbackForm() {
      if (selectedRating === 0) {
        alert("Please tap a star count to complete evaluation scale.");
        return;
      }
      const comment = document.getElementById('feedbackComment').value.trim();

      await fetch('/feedback', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          session_id: sessionId,
          rating: selectedRating,
          comment
        })
      });

      closeFeedback();
      addMessage("Thank you for your feedback! It genuinely helps me improve. 😊", 'magni');
    }

    let resolutionSubmitted = false;

    function showResolutionBar() {
      if (resolutionSubmitted) return;
      const bar = document.getElementById('resolutionBar');
      bar.classList.add('visible');
    }

    async function submitResolution(resolved) {
      resolutionSubmitted = true;
      const bar = document.getElementById('resolutionBar');
      bar.innerHTML = resolved
        ? '<span style="font-size:0.82rem;color:#38a169;">✅ Great! Glad we could help.</span>'
        : '<span style="font-size:0.82rem;color:#e53e3e;">❌ Sorry to hear that. We\'ll keep improving.</span>';

      await fetch('/resolve', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ session_id: sessionId, resolved })
      });

      // Show feedback modal after short delay
      setTimeout(showFeedback, 1500);
    }

    // Star rating selection loops
    document.querySelectorAll('.star').forEach(star => {
      star.addEventListener('click', () => {
        selectedRating = parseInt(star.dataset.rating);
        document.querySelectorAll('.star').forEach((s, i) => {
          if (i < selectedRating) {
            s.classList.add('active');
          } else {
            s.classList.remove('active');
          }
        });
      });
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <link rel="icon" type="image/svg+xml" href="/static/icons/magni-micro.svg">
  <link rel="manifest" href="/static/manifest.json">
  <meta name="theme-color" content="#08081a">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Magni — Admin Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@300;400;600&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
    /* ── Magni Brand Colors ── */
    --magni-midnight: #08081a;
    --magni-deep-sky: #1a1a3a;
    --magni-gold: #fbdc64;
    --magni-amber: #9a5a00;
    --magni-oasis: #2a4a8a;
    --magni-gold-light: #ffe566;
    --magni-gold-glow: rgba(251,220,100,0.25);

      --bg: #faf7f2;
      --bg-dark: #1a1a2e;
      --amber: #d4810a;
      --amber-light: #f5a623;
      --amber-dim: rgba(212,129,10,0.1);
      --amber-glow: rgba(212,129,10,0.25);
      --text: #1a1a1a;
      --text-dim: #6b6b6b;
      --border: rgba(0,0,0,0.08);
      --border-strong: rgba(0,0,0,0.14);
      --shadow-lg: 0 8px 40px rgba(0,0,0,0.12);
      --font-display: 'Fraunces', serif;
      --font-body: 'DM Sans', sans-serif;
      --font-mono: 'DM Mono', monospace;
    }
    body {
      font-family: var(--font-body);
      background: var(--bg-dark);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .login-card {
      background: #ffffff;
      border-radius: 20px;
      padding: 2.5rem;
      width: 100%;
      max-width: 400px;
      box-shadow: var(--shadow-lg);
    }
    .login-brand {
      text-align: center;
      margin-bottom: 2rem;
    }
    .login-avatar {
      width: 64px; height: 64px;
      border-radius: 50%;
      overflow: hidden;
      margin: 0 auto 1rem;
    }
    .login-title {
      font-family: var(--font-display);
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 0.2rem;
    }
    .login-subtitle {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      color: var(--text-dim);
      text-transform: uppercase;
    }
    .form-group { margin-bottom: 1.2rem; }
    label {
      display: block; font-size: 0.8rem; font-weight: 500;
      color: var(--text-dim); margin-bottom: 0.4rem;
    }
    input {
      width: 100%; padding: 0.8rem 1rem;
      border: 1.5px solid var(--border-strong);
      border-radius: 10px; font-family: var(--font-body);
      font-size: 0.9rem; color: var(--text);
      background: var(--bg); outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input:focus {
      border-color: var(--amber);
      box-shadow: 0 0 0 3px var(--amber-dim);
    }
    .btn-login {
      width: 100%; padding: 0.85rem;
      background: linear-gradient(135deg, var(--amber), var(--amber-light));
      color: white; border: none; border-radius: 10px;
      font-family: var(--font-body); font-size: 0.9rem;
      font-weight: 600; cursor: pointer;
      box-shadow: 0 2px 8px var(--amber-glow);
      transition: opacity 0.2s, transform 0.2s;
      margin-top: 0.5rem;
    }
    .btn-login:hover { opacity: 0.9; transform: translateY(-1px); }
    .error {
      background: rgba(229,62,62,0.08);
      border: 1px solid rgba(229,62,62,0.2);
      color: #e53e3e; border-radius: 8px;
      padding: 0.7rem 1rem; font-size: 0.82rem;
      margin-bottom: 1rem; text-align: center;
    }
    .back-link {
      display: block; text-align: center; margin-top: 1.2rem;
      font-family: var(--font-mono); font-size: 0.72rem;
      color: var(--text-dim); text-decoration: none;
      letter-spacing: 0.05em; transition: color 0.2s;
    }
    .back-link:hover { color: var(--amber); }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-brand">
      <div class="login-avatar">

-width="1.0" stroke-linecap="round" opacity="0.25"/><circle cx="66" cy="400" r="5" fill="#1a0a04"/><path d="M92 526 C91 506 90 486 91 466 C92 448 94 432 96 418" fill="none" stroke="#150804" stroke-width="8" stroke-linecap="round"/><path d="M96 418 C74 400 50 395 32 402" fill="none" stroke="#1a0e05" stroke-width="4.5" stroke-linecap="round"/><path d="M96 418 C92 394 90 376 92 362" fill="none" stroke="#1a0e05" stroke-width="3.8" stroke-linecap="round"/><path d="M96 418 C112 400 126 396 138 400" fill="none" stroke="#1a0e05" stroke-width="4.5" stroke-linecap="round"/><path d="M96 418 C74 400 50 395 32 402" fill="none" stroke="#ff8830" stroke-width="1.0" stroke-linecap="round" opacity="0.25"/><circle cx="100" cy="428" r="4.5" fill="#1a0a04"/><ellipse cx="118" cy="492" rx="28" ry="18" fill="#1a0e04"/><ellipse cx="114" cy="474" rx="14" ry="12" fill="#1a0e04"/><rect x="128" y="506" width="7" height="24" rx="3.5" fill="#150a04"/><rect x="140" y="506" width="7" height="24" rx="3.5" fill="#100804"/><rect x="127" y="527" width="9" height="5" rx="2" fill="#0a0402"/><rect x="139" y="527" width="9" height="5" rx="2" fill="#0a0402"/><rect x="100" y="506" width="7" height="24" rx="3.5" fill="#150a04"/><rect x="112" y="506" width="7" height="24" rx="3.5" fill="#100804"/><rect x="99" y="527" width="9" height="5" rx="2" fill="#0a0402"/><rect x="111" y="527" width="9" height="5" rx="2" fill="#0a0402"/><path d="M96 488 C90 496 86 507 82 519" fill="none" stroke="#1a0e04" stroke-width="11" stroke-linecap="round"/><path d="M96 488 C90 496 86 507 82 519" fill="none" stroke="#ff9940" stroke-width="3" stroke-linecap="round" opacity="0.35"/><ellipse cx="79" cy="522" rx="12" ry="9" fill="#1a0e04" transform="rotate(-25 79 522)"/><ellipse cx="70" cy="526" rx="8" ry="5.5" fill="#150a04" transform="rotate(-25 70 526)"/><circle cx="82" cy="517" r="3" fill="#050200"/><circle cx="83" cy="516" r="1.3" fill="#ff9940" opacity="0.6"/><ellipse cx="88" cy="514" rx="3.5" ry="5.5" fill="#1a0e04" transform="rot       </div>
      <div class="login-title">Magni</div>
      <div class="login-subtitle">Admin Portal</div>
    </div>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/admin/login">
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" placeholder="Enter username" autocomplete="username" required/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="Enter password" autocomplete="current-password" required/>
      </div>
      <button type="submit" class="btn-login">Sign In to Admin Portal</button>
    </form>

    <a href="/" class="back-link">← Back to Magni Chat</a>
  </div>
</body>
</html>

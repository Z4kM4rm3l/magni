<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <link rel="icon" type="image/svg+xml" href="/static/icons/magni-micro.svg">
  <link rel="manifest" href="/static/manifest.json">
  <meta name="theme-color" content="#08081a">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Magni — Client Management</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@300;400;600&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
    /* ── Magni Brand Colors ── */
    --magni-midnight: #08081a;
    --magni-deep-sky: #1a1a3a;
    --magni-gold: #fbdc64;
    --magni-amber: #9a5a00;
    --magni-oasis: #2a4a8a;
    --magni-gold-light: #ffe566;
    --magni-gold-glow: rgba(251,220,100,0.25);

      --bg: #faf7f2;
      --bg-card: #ffffff;
      --bg-dark: #1a1a2e;
      --amber: #d4810a;
      --amber-light: #f5a623;
      --amber-dim: rgba(212,129,10,0.1);
      --amber-glow: rgba(212,129,10,0.25);
      --green: #38a169;
      --green-dim: rgba(56,161,105,0.1);
      --red: #e53e3e;
      --red-dim: rgba(229,62,62,0.1);
      --text: #1a1a1a;
      --text-dim: #6b6b6b;
      --text-light: #9b9b9b;
      --border: rgba(0,0,0,0.08);
      --border-strong: rgba(0,0,0,0.14);
      --shadow: 0 2px 20px rgba(0,0,0,0.06);
      --shadow-lg: 0 8px 40px rgba(0,0,0,0.12);
      --font-display: 'Fraunces', serif;
      --font-body: 'DM Sans', sans-serif;
      --font-mono: 'DM Mono', monospace;
    }
    html, body { min-height: 100%; font-family: var(--font-body); background: var(--bg); color: var(--text); }

    header {
      background: var(--bg-dark); padding: 1rem 2rem;
      display: flex; align-items: center; justify-content: space-between;
    }
    .header-brand { display: flex; align-items: center; gap: 0.8rem; }
    .header-brand-name { font-family: var(--font-display); font-size: 1.4rem; color: white; }
    .header-badge {
      font-family: var(--font-mono); font-size: 0.65rem; letter-spacing: 0.15em;
      color: var(--amber-light); background: rgba(212,129,10,0.15);
      border: 1px solid rgba(212,129,10,0.3); padding: 0.2rem 0.6rem;
      border-radius: 20px; text-transform: uppercase;
    }
    .header-nav { display: flex; gap: 1.5rem; align-items: center; }
    .header-nav a {
      font-family: var(--font-mono); font-size: 0.8rem;
      color: rgba(255,255,255,0.6); text-decoration: none; transition: color 0.2s;
    }
    .header-nav a:hover { color: white; }

    .container { max-width: 1200px; margin: 0 auto; padding: 2rem; }
    .page-title { font-family: var(--font-display); font-size: 2rem; font-weight: 600; margin-bottom: 0.3rem; }
    .page-subtitle { font-size: 0.9rem; color: var(--text-dim); margin-bottom: 2rem; }

    /* STATS */
    .stats-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 1rem; margin-bottom: 2rem; }
    .stat-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 12px; padding: 1.2rem; text-align: center; box-shadow: var(--shadow);
    }
    .stat-value { font-family: var(--font-display); font-size: 2rem; color: var(--amber); line-height: 1; }
    .stat-value.green { color: var(--green); }
    .stat-label { font-size: 0.72rem; color: var(--text-dim); margin-top: 0.3rem; font-weight: 500; }

    /* LAYOUT */
    .grid { display: grid; grid-template-columns: 380px 1fr; gap: 2rem; align-items: start; }

    .card {
      background: var(--bg-card); border-radius: 16px;
      border: 1px solid var(--border); box-shadow: var(--shadow); padding: 1.8rem;
    }
    .card-title {
      font-family: var(--font-display); font-size: 1.1rem; font-weight: 600;
      margin-bottom: 1.2rem; padding-bottom: 0.8rem; border-bottom: 1px solid var(--border);
    }

    /* FORM */
    .form-group { margin-bottom: 1rem; }
    label { display: block; font-size: 0.78rem; font-weight: 500; color: var(--text-dim); margin-bottom: 0.35rem; }
    input, select, textarea {
      width: 100%; padding: 0.65rem 0.9rem;
      border: 1.5px solid var(--border-strong); border-radius: 8px;
      font-family: var(--font-body); font-size: 0.85rem; color: var(--text);
      background: var(--bg); outline: none; transition: border-color 0.2s, box-shadow 0.2s;
    }
    input:focus, select:focus, textarea:focus {
      border-color: var(--amber); box-shadow: 0 0 0 3px var(--amber-dim);
    }
    textarea { resize: vertical; min-height: 70px; }

    .btn {
      font-family: var(--font-body); font-size: 0.85rem; font-weight: 500;
      padding: 0.7rem 1.2rem; border-radius: 8px; border: none;
      cursor: pointer; transition: all 0.2s; display: inline-flex; align-items: center; gap: 0.4rem;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--amber), var(--amber-light));
      color: white; box-shadow: 0 2px 8px var(--amber-glow); width: 100%; justify-content: center;
    }
    .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .btn-sm { font-size: 0.72rem; padding: 0.35rem 0.7rem; border-radius: 6px; }
    .btn-suspend { background: var(--red-dim); color: var(--red); border: 1px solid rgba(229,62,62,0.2); }
    .btn-activate { background: var(--green-dim); color: var(--green); border: 1px solid rgba(56,161,105,0.2); }
    .btn-edit { background: var(--amber-dim); color: var(--amber); border: 1px solid rgba(212,129,10,0.2); }
    .btn-delete { background: var(--red-dim); color: var(--red); border: 1px solid rgba(229,62,62,0.2); }
    .btn-cancel { background: var(--bg); color: var(--text-dim); border: 1px solid var(--border-strong); }

    /* CLIENT LIST */
    .client-list { display: flex; flex-direction: column; gap: 1rem; }
    .client-item {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 12px; padding: 1.2rem 1.4rem; transition: border-color 0.2s;
    }
    .client-item:hover { border-color: var(--amber); }
    .client-item.suspended { opacity: 0.65; border-left: 3px solid var(--red); }
    .client-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.6rem; gap: 1rem; }
    .client-name { font-weight: 600; font-size: 0.95rem; }
    .client-email { font-size: 0.78rem; color: var(--text-dim); margin-bottom: 0.5rem; }
    .client-meta { display: flex; gap: 0.6rem; flex-wrap: wrap; margin-bottom: 0.8rem; }
    .badge {
      font-family: var(--font-mono); font-size: 0.62rem; letter-spacing: 0.08em;
      padding: 0.15rem 0.5rem; border-radius: 20px; text-transform: uppercase;
    }
    .badge-tier-starter { background: var(--amber-dim); color: var(--amber); border: 1px solid rgba(212,129,10,0.2); }
    .badge-tier-professional { background: rgba(99,102,241,0.1); color: #6366f1; border: 1px solid rgba(99,102,241,0.2); }
    .badge-tier-enterprise { background: rgba(16,185,129,0.1); color: #10b981; border: 1px solid rgba(16,185,129,0.2); }
    .badge-active { background: var(--green-dim); color: var(--green); border: 1px solid rgba(56,161,105,0.2); }
    .badge-suspended { background: var(--red-dim); color: var(--red); border: 1px solid rgba(229,62,62,0.2); }
    .client-usage { font-size: 0.75rem; color: var(--text-dim); margin-bottom: 0.7rem; }
    .usage-bar { height: 4px; background: var(--border-strong); border-radius: 2px; margin-top: 0.3rem; overflow: hidden; }
    .usage-fill { height: 100%; background: linear-gradient(90deg, var(--amber), var(--amber-light)); border-radius: 2px; transition: width 0.3s; }
    .usage-fill.warning { background: linear-gradient(90deg, #e53e3e, #fc8181); }
    .client-actions { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .client-id { font-family: var(--font-mono); font-size: 0.62rem; color: var(--text-light); }

    /* EMPTY */
    .empty-state { text-align: center; padding: 3rem 1rem; color: var(--text-light); }
    .empty-icon { font-size: 2.5rem; margin-bottom: 0.8rem; }

    /* TOAST */
    .toast {
      position: fixed; bottom: 2rem; right: 2rem;
      background: var(--bg-dark); color: white;
      padding: 0.8rem 1.4rem; border-radius: 10px;
      font-size: 0.85rem; box-shadow: var(--shadow-lg);
      transform: translateY(100px); opacity: 0;
      transition: all 0.3s; z-index: 200;
    }
    .toast.visible { transform: translateY(0); opacity: 1; }
    .toast.success { border-left: 3px solid #4ade80; }
    .toast.error { border-left: 3px solid var(--red); }

    @media (max-width: 900px) {
      .grid { grid-template-columns: 1fr; }
      .stats-row { grid-template-columns: repeat(3, 1fr); }
    }
  </style>
</head>
<body>

</header>

<div class="container">
  <div class="page-title">Client Accounts</div>
  <p class="page-subtitle">Manage client subscriptions, tiers, and access control.</p>

  <!-- STATS -->
  <div class="stats-row" id="statsRow">
    <div class="stat-card"><div class="stat-value" id="statTotal">—</div><div class="stat-label">Total Clients</div></div>
    <div class="stat-card"><div class="stat-value green" id="statActive">—</div><div class="stat-label">Active</div></div>
    <div class="stat-card"><div class="stat-value" id="statSuspended" style="color:var(--red)">—</div><div class="stat-label">Suspended</div></div>
    <div class="stat-card"><div class="stat-value" id="statMRR">—</div><div class="stat-label">MRR</div></div>
    <div class="stat-card">
      <div class="stat-value" style="font-size:1rem;padding-top:0.4rem;" id="statTiers">—</div>
      <div class="stat-label">S / P / E Breakdown</div>
    </div>
  </div>

  <div class="grid">

    <!-- LEFT — ADD/EDIT CLIENT -->
    <div>
      <div class="card">
        <div class="card-title" id="formTitle">Add New Client</div>

        <div class="form-group">
          <label>Business Name</label>
          <input type="text" id="businessName" placeholder="e.g. Cape Coral HVAC"/>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="clientEmail" placeholder="owner@business.com"/>
        </div>
        <div class="form-group">
          <label>Subscription Tier</label>
          <select id="clientTier">
            <option value="starter">Starter — $79/mo</option>
            <option value="professional">Professional — $249/mo</option>
            <option value="enterprise">Enterprise — $599/mo</option>
          </select>
        </div>
        <div class="form-group">
          <label>Bot Name</label>
          <input type="text" id="botName" placeholder="e.g. Magni (or their custom name)"/>
        </div>
        <div class="form-group">
          <label>Billing Date (next renewal)</label>
          <input type="date" id="billingDate"/>
        </div>
        <div class="form-group">
          <label>Notes (internal only)</label>
          <textarea id="clientNotes" placeholder="Setup notes, special requests, contact history..."></textarea>
        </div>

        <div style="display:flex;gap:0.6rem;margin-top:0.5rem;">
          <button class="btn btn-cancel" id="cancelBtn" onclick="cancelEdit()" style="display:none;flex:1;">Cancel</button>
          <button class="btn btn-primary" id="submitBtn" onclick="submitClient()">✦ Save Client</button>
        </div>
      </div>
    </div>

    <!-- RIGHT — CLIENT LIST -->
    <div>
      <div class="card">
        <div class="card-title">All Clients <span id="clientCount" style="font-weight:300;color:var(--text-light);font-size:0.85rem;"></span></div>
        <div class="client-list" id="clientList">
          <div style="text-align:center;padding:2rem;color:var(--text-light);">Loading clients...</div>
        </div>
      </div>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  let clients = [];
  let editingId = null;

  async function loadClients() {
    try {
      const res = await fetch('/api/clients');
      const data = await res.json();
      clients = data.clients || [];
      renderClients(clients);
      updateStats(data.stats || {});
    } catch (e) {
      document.getElementById('clientList').innerHTML =
        '<div class="empty-state"><div class="empty-icon">⚠️</div><p>Could not load clients.</p></div>';
    }
  }

  function updateStats(stats) {
    document.getElementById('statTotal').textContent = stats.total ?? '0';
    document.getElementById('statActive').textContent = stats.active ?? '0';
    document.getElementById('statSuspended').textContent = stats.suspended ?? '0';
    document.getElementById('statMRR').textContent = stats.mrr ? `$${stats.mrr.toLocaleString()}` : '$0';
    const t = stats.by_tier || {};
    document.getElementById('statTiers').textContent =
      `${t.starter||0} / ${t.professional||0} / ${t.enterprise||0}`;
  }

  function renderClients(clients) {
    const container = document.getElementById('clientList');
    document.getElementById('clientCount').textContent =
      clients.length > 0 ? `(${clients.length})` : '';

    if (clients.length === 0) {
      container.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">🏢</div>
          <p>No clients yet. Add your first client to get started.</p>
        </div>`;
      return;
    }

    container.innerHTML = clients.map(c => {
      const limit = c.conversation_limit;
      const used = c.conversations_used || 0;
      const pct = limit > 0 ? Math.min(100, Math.round((used/limit)*100)) : 0;
      const warning = pct >= 80;

      return `
      <div class="client-item ${c.status === 'suspended' ? 'suspended' : ''}" id="client-${c.client_id}">
        <div class="client-header">
          <div>
            <div class="client-name">${escapeHtml(c.business_name)}</div>
            <div class="client-id">ID: ${c.client_id}</div>
          </div>
          <div style="display:flex;gap:0.4rem;flex-shrink:0;">
            <span class="badge badge-tier-${c.tier}">${c.tier}</span>
            <span class="badge badge-${c.status}">${c.status}</span>
          </div>
        </div>
        <div class="client-email">📧 ${escapeHtml(c.email)} &nbsp;·&nbsp; 🤖 ${escapeHtml(c.bot_name || 'Magni')}</div>
        <div class="client-usage">
          Conversations: ${used.toLocaleString()} / ${limit > 0 ? limit.toLocaleString() : '∞'} (${pct}%)
          <div class="usage-bar"><div class="usage-fill ${warning ? 'warning' : ''}" style="width:${pct}%"></div></div>
        </div>
        <div class="client-actions">
          <button class="btn btn-sm btn-edit" onclick="editClient('${c.client_id}')">✏️ Edit</button>
          ${c.status === 'active'
            ? `<button class="btn btn-sm btn-suspend" onclick="suspendClient('${c.client_id}')">⏸ Suspend</button>`
            : `<button class="btn btn-sm btn-activate" onclick="activateClient('${c.client_id}')">▶ Activate</button>`
          }
          <button class="btn btn-sm btn-delete" onclick="deleteClient('${c.client_id}')">🗑 Delete</button>
          ${c.billing_date ? `<span style="font-size:0.7rem;color:var(--text-light);margin-left:auto;">Renews: ${c.billing_date}</span>` : ''}
        </div>
      </div>`;
    }).join('');
  }

  async function submitClient() {
    const businessName = document.getElementById('businessName').value.trim();
    const email = document.getElementById('clientEmail').value.trim();
    const tier = document.getElementById('clientTier').value;
    const botName = document.getElementById('botName').value.trim() || 'Magni';
    const billingDate = document.getElementById('billingDate').value;
    const notes = document.getElementById('clientNotes').value.trim();

    if (!businessName || !email) {
      showToast('Business name and email are required.', 'error');
      return;
    }

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = '⏳ Saving...';

    try {
      const method = editingId ? 'PUT' : 'POST';
      const url = editingId ? `/api/clients/${editingId}` : '/api/clients';

      const res = await fetch(url, {
        method,
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ business_name: businessName, email, tier, bot_name: botName, billing_date: billingDate, notes })
      });

      const data = await res.json();
      if (res.ok) {
        showToast(editingId ? 'Client updated!' : 'Client added!', 'success');
        cancelEdit();
        await loadClients();
      } else {
        showToast(data.error || 'Something went wrong.', 'error');
      }
    } catch (e) {
      showToast('Connection error.', 'error');
    }

    btn.disabled = false;
    btn.textContent = '✦ Save Client';
  }

  function editClient(id) {
    const client = clients.find(c => c.client_id === id);
    if (!client) return;
    editingId = id;
    document.getElementById('businessName').value = client.business_name;
    document.getElementById('clientEmail').value = client.email;
    document.getElementById('clientTier').value = client.tier;
    document.getElementById('botName').value = client.bot_name || '';
    document.getElementById('billingDate').value = client.billing_date || '';
    document.getElementById('clientNotes').value = client.notes || '';
    document.getElementById('formTitle').textContent = 'Edit Client';
    document.getElementById('cancelBtn').style.display = 'block';
    document.getElementById('submitBtn').textContent = '✦ Update Client';
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function cancelEdit() {
    editingId = null;
    document.getElementById('businessName').value = '';
    document.getElementById('clientEmail').value = '';
    document.getElementById('clientTier').value = 'starter';
    document.getElementById('botName').value = '';
    document.getElementById('billingDate').value = '';
    document.getElementById('clientNotes').value = '';
    document.getElementById('formTitle').textContent = 'Add New Client';
    document.getElementById('cancelBtn').style.display = 'none';
    document.getElementById('submitBtn').textContent = '✦ Save Client';
  }

  async function suspendClient(id) {
    if (!confirm('Suspend this client? Their bot will stop responding immediately.')) return;
    const res = await fetch(`/api/clients/${id}/suspend`, { method: 'POST' });
    if (res.ok) { showToast('Client suspended.', 'success'); await loadClients(); }
    else showToast('Could not suspend client.', 'error');
  }

  async function activateClient(id) {
    const res = await fetch(`/api/clients/${id}/activate`, { method: 'POST' });
    if (res.ok) { showToast('Client reactivated!', 'success'); await loadClients(); }
    else showToast('Could not activate client.', 'error');
  }

  async function deleteClient(id) {
    if (!confirm('Permanently delete this client? This cannot be undone.')) return;
    const res = await fetch(`/api/clients/${id}`, { method: 'DELETE' });
    if (res.ok) { showToast('Client deleted.', 'success'); await loadClients(); }
    else showToast('Could not delete client.', 'error');
  }

  function showToast(message, type = 'success') {
    const toast = document.getElementById('toast');
    toast.textContent = message;
    toast.className = `toast ${type} visible`;
    setTimeout(() => toast.classList.remove('visible'), 3000);
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.appendChild(document.createTextNode(str || ''));
    return div.innerHTML;
  }

  loadClients();
</script>
</body>
</html>
